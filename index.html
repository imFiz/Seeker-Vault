    <title>Seeker Vault</title>
    <script>
      // Prevent polyfills from crashing when trying to overwrite native fetch
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            // Try to make it writable by redefining it
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Polyfill attempted to overwrite window.fetch. Ignoring to prevent crash.');
                // Optional: originalFetch = v; // if we want to allow the polyfill to take over
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Could not redefine fetch:', e);
        }
      })();
    </script>
